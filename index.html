<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рабочее пространство — Светлана Быкова</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
    <script>window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>window.database = {};</script>
    <script src="tower_template.js"></script>
    <script src="task1.js"></script><script src="task2.js"></script><script src="task3.js"></script><script src="task4.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px; }
        .layout-wrapper { display: flex; gap: 30px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        .sidebar { flex: 0 0 300px; background-color: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; position: sticky; top: 40px; text-align: center; }
        .author-photo { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; border: 4px solid #ff8c00; margin-bottom: 15px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; color: #ff8c00; padding: 12px; border-radius: 8px; text-decoration: none; margin-bottom: 12px; border: 2px solid #ff8c00; font-weight: bold; }
        .social-btn:hover { background: #ff8c00; color: #121212; }
        .main-content { flex: 1; background-color: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .task-row { background-color: #2a2a2a; padding: 15px 20px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #ff8c00; }
        .row-header { display: flex; justify-content: space-between; align-items: center; }
        .theme-select, input[type="number"] { background: #121212; border: 1px solid #555; color: #ff8c00; padding: 8px; border-radius: 6px; outline: none; }
        .btn-settings { background: #333; color: #aaa; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .proto-list { display: none; margin-top: 15px; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; }
        .btn-generate { display: block; width: 100%; background: transparent; color: #ff8c00; border: 2px solid #ff8c00; padding: 15px; font-size: 1.2em; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; }
        .btn-generate:hover { background: #ff8c00; color: #121212; }
        .btn-group { display: none; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-dl { flex: 1; min-width: 180px; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #output-section { margin-top: 30px; display: none; border-radius: 12px; border: 2px solid #ff8c00; overflow: hidden; }
        .preview-paper { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; color: #333; border-radius: 12px; }
        svg { overflow: visible; }
        @media print {
            @page { margin: 20mm; size: A4; }
            body { background: #fff !important; color: #000 !important; }
            .layout-wrapper, .modal-overlay { display: none !important; }
            #print-container { display: block !important; }
            #print-footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; font-family: 'Caveat'; font-size: 20px; color: #777; }
            .task-print-block { page-break-inside: avoid; margin-bottom: 30px; }
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 12px; border: 2px solid #ff8c00; width: 90%; max-width: 500px; text-align: center; }
    </style>
</head>
<body>
<div id="print-footer-fixed" style="display:none;">Шкатулка математических интерактивов</div>
<div id="print-container"></div>

    <aside class="sidebar">
        <img src="photo.jpg" class="author-photo">

        <div style="margin-top: 20px; padding: 10px; background: #2a2a2a; border-radius: 8px; font-size: 0.8em;">
            Обновление: исправлена плашка, оптимизирована печать, функции генерации работают корректно.
        </div>
    </aside>
    <main class="main-content">
        <h2 style="text-align:center;">Рабочее пространство</h2>
        <div class="task-row">
            <div class="row-header">
                <label><input type="checkbox" id="toggle-signature"> Добавить подпись учителя</label>
                <div id="signature-controls" style="display:none; gap:10px;">
                    <select id="teacher-gender" class="theme-select"><option value="female">Она</option><option value="male">Он</option></select>
                    <input type="text" id="teacher-name" placeholder="Имя..." class="theme-select">
                </div>
            </div>
        </div>
        <div class="task-row"><div class="row-header"><label>Таймер (мин)</label><input type="number" id="timer-input" value="0"></div></div>
        <div id="dynamic-tasks"></div>
        <button class="btn-generate" onclick="generateVariant()">СГЕНЕРИРОВАТЬ ВАРИАНТ</button>
        <div id="btn-group" class="btn-group">
            <button class="btn-dl" style="background:#4CAF50" onclick="downloadStudentHTML()">💻 Интерактив</button>
            <button class="btn-dl" style="background:#1976d2" onclick="downloadPrintPDF()">🖨️ Печать</button>
            <button class="btn-dl" style="background:#e65100" onclick="openGameMenu()">🏰 Игра</button>
            <button class="btn-dl" style="background:#7b1fa2" onclick="openPresentationMenu()">🎬 Презентация</button>
        </div>
        <div id="output-section"></div>
    </main>
</div>

<div id="pres-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">

        <h2 style="color:#ff8c00">Выбор дизайна</h2>
        <div style="background:#2a2a2a; padding:15px; border-radius:10px; cursor:pointer;" onclick="generatePresentation1()">

</div>

<div id="game-modal" class="modal-overlay" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-box">
        <h2 style="color:#ff8c00">Игра</h2>
        <div style="background:#2a2a2a; padding:15px; border-radius:10px; cursor:pointer;" onclick="generateTowerGame()">
            <b style="color:#ff8c00">Башня знаний (9 задач)</b>
        </div>
    </div>
</div>

<div id="proto-tooltip" style="position:fixed; background:#fff; border:1px solid #ff8c00; padding:10px; display:none; z-index:10000; color:#000;"></div>

<script>
const ASSETS_URL = "https://svetlana18011991.github.io/generator11prof/";
const SCRIPT_END = "</" + "script>";
let globalPool = [], lastPack = "", lastId = -1;
const sciQuotes = {1:"Математика — царица наук. Гаусс", 2:"Язык природы. Лобачевский", 3:"Капля в океане. Ньютон", 4:"Нет царского пути. Евклид", 5:"Числа правят миром. Пифагор"};
let curIntHTML="", curPrintHTML="", curTasks=[], selTitles=[];

window.autoFixSVGArrows = function(container) {
    if(!container) return;
    let ns = 'http://www.w3.org/2000/svg';
    container.querySelectorAll('svg').forEach(svg => {
        svg.style.overflow = 'visible';
        svg.querySelectorAll('[marker-end]').forEach(el => {
            el.removeAttribute('marker-end');
            let pts = null, tag = el.tagName.toLowerCase();
            if(tag==='line') pts=[{x:el.getAttribute('x1'),y:el.getAttribute('y1')},{x:el.getAttribute('x2'),y:el.getAttribute('y2')}];
            else if(tag==='path'){ let d=el.getAttribute('d'), n=d.match(/[+-]?\d*\.?\d+/g); if(n&&n.length>=4) pts=[{x:n[n.length-4],y:n[n.length-3]},{x:n[n.length-2],y:n[n.length-1]}]; }
            if(pts){
                let dx=pts[1].x-pts[0].x, dy=pts[1].y-pts[0].y, ang=Math.atan2(dy,dx), hl=Math.max(8, parseFloat(el.getAttribute('stroke-width')||1)*3.5);
                let p3={x:pts[1].x-hl*Math.cos(ang-Math.PI/7), y:pts[1].y-hl*Math.sin(ang-Math.PI/7)};
                let p4={x:pts[1].x-hl*Math.cos(ang+Math.PI/7), y:pts[1].y-hl*Math.sin(ang+Math.PI/7)};
                let a=document.createElementNS(ns,'polygon'); a.setAttribute('points',`${pts[1].x},${pts[1].y} ${p3.x},${p3.y} ${p4.x},${p4.y}`); a.setAttribute('fill', el.getAttribute('stroke')||'#000');
                el.parentNode.appendChild(a);
            }
        });
    });
};

document.addEventListener('DOMContentLoaded', () => {
    let c = document.getElementById('dynamic-tasks');
    for(let id in window.database) {
        let d = window.database[id];
        c.innerHTML += `<div class="task-row"><div class="row-header"><label onclick="toggleSet(${id})"><b>${d.title}</b></label><input type="number" id="cnt-${id}" value="0" min="0" style="width:50px"></div><div id="protos-${id}" class="proto-list">${d.prototypes.map((p,i)=>`<label><input type="checkbox" id="p-${id}-${i}" checked> ${i+1}</label>`).join('')}</div></div>`;
    }
});
function toggleSet(id){ let e=document.getElementById('protos-'+id); e.style.display=(e.style.display==='grid'?'none':'grid'); }
function handleSignatureChange(){ document.getElementById('signature-controls').style.display = document.getElementById('toggle-signature').checked?'flex':'none'; }

function generateVariant() {
    curIntHTML=""; curPrintHTML=""; curTasks=[]; selTitles=[];
    let taskIdx=0, pack=document.getElementById('sticker-select').value;
    for(let id in window.database) {
        let n=parseInt(document.getElementById('cnt-'+id).value)||0; if(n<=0)continue;
        selTitles.push(window.database[id].title);
        let ps = window.database[id].prototypes.filter((p,i)=>document.getElementById(`p-${id}-${i}`).checked);
        for(let i=0; i<n; i++){
            taskIdx++; let p=ps[i%ps.length], t=p.tasks[Math.floor(Math.random()*t.length)];
            let sHTML="", m=pack==='ro'?1.3:0.8;
            if(pack!=='none' && taskIdx%3===0){
                if(globalPool.length===0){ globalPool=[1,2,3,4,5]; if(pack==='ro')globalPool.push(6,7,8,9,10); globalPool.sort(()=>Math.random()-0.5); }
                let sid=globalPool.pop(); sHTML=`<div style="float:right;width:120px;text-align:center"><img src="${ASSETS_URL}${pack}_${sid}.png" style="width:${100*m}px"></div>`;
            }
            let svg=p.svg_code||""; let div=document.createElement('div'); div.innerHTML=svg; window.autoFixSVGArrows(div); svg=div.innerHTML;
            curIntHTML += `<div style="margin-bottom:20px;clear:both">${sHTML}<b>${taskIdx}.</b> ${svg}${t.text}<br><input type="text" class="ans" data-ans="${t.answer}"></div>`;
            curPrintHTML += `<div class="task-print-block">${sHTML}<b>${taskIdx}.</b> ${svg}${t.text}<br>Ответ: ________</div>`;
            curTasks.push({text:t.text,svg:svg,answer:t.answer});
        }
    }
    document.getElementById('btn-group').style.display='flex'; renderPreview();
}
function renderPreview(){ document.getElementById('output-section').innerHTML=`<div class="preview-paper">${curIntHTML}</div>`; if(window.MathJax)MathJax.typesetPromise(); }

function downloadPrintPDF(){
    let s = document.getElementById('toggle-signature').checked?`<h3 style="text-align:center">Вариант подготовила: ${document.getElementById('teacher-name').value}</h3>`:"";
    let h = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@media print{@page{margin:15mm}body{font-family:serif}.f{position:fixed;bottom:0;width:100%;text-align:center;font-size:14px;color:#999}.task-print-block{page-break-inside:avoid;margin-bottom:20px;clear:both}svg{overflow:visible;max-width:100%}}</style></head>
    <body><div class="f">Шкатулка математических интерактивов</div>${s}${curPrintHTML}<script>setTimeout(()=>window.print(),500)${SCRIPT_END}</body></html>`;
    let b=new Blob([h],{type:"text/html"}); let a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="Печать.html"; a.click();
}

function generatePresentation1(){
    let s=curTasks.map((t,i)=>`
    <div class="slide" style="width:100vw;height:100vh;position:relative;background:url('${ASSETS_URL}p2.jpg') center/cover;display:none;align-items:center;justify-content:center;">
        <div style="position:absolute;top:calc(15% - 70px);right:5%;width:50%;display:flex;justify-content:center;">
            <div style="width:280px;height:150px;background:url('${ASSETS_URL}p3.jpg') center/contain no-repeat;display:flex;align-items:center;justify-content:center;padding-bottom:10px;">
                <h2 style="font-family:Caveat;font-size:30px;margin:0">Задание ${i+1}</h2>
            </div>
        </div>
        <div style="position:absolute;right:5%;top:15%;width:50%;height:70%;background:rgba(255,255,255,0.95);border:2px solid #ff8c00;border-radius:15px;padding:30px;text-align:center;box-shadow:0 0 20px #ff8c00;">
            <div style="font-size:1.4em">${t.svg}${t.text}</div>
            <div style="margin-top:20px"><input type="text" style="width:120px;padding:10px;font-size:1.2em;text-align:center"></div>
        </div>
    </div>`).join('');
    let f=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;overflow:hidden}.slide{display:none !important}.slide.active{display:flex !important}svg{overflow:visible}</style></head>
    <body>${s}<script>let c=0,sl=document.querySelectorAll('.slide');function show(n){sl.forEach(x=>x.classList.remove('active'));sl[n].classList.add('active');}window.onclick=()=>{if(c<sl.length-1)show(++c)};show(0);${SCRIPT_END}</body></html>`;
    let b=new Blob([f],{type:"text/html"}); window.open(URL.createObjectURL(b));
}

function downloadStudentHTML(){
    let h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><script>window.MathJax={tex:{inlineMath:[['$','$']]}};${SCRIPT_END}<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">${SCRIPT_END}
    <style>body{font-family:sans-serif;background:#f0f0f0;padding:20px}.p{max-width:800px;margin:0 auto;background:#fff;padding:30px;border-radius:10px}svg{overflow:visible}</style></head>
    <body><div class="p">${curIntHTML}</div></body></html>`;
    let b=new Blob([h],{type:"text/html"}); let a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="Интерактив.html"; a.click();
}

function generateTowerGame(){
    if(curTasks.length<9){alert("Нужно минимум 9 задач");return;}
    let q=curTasks.slice(0,9).map(t=>({type:"input",prompt:t.svg+t.text,accepts:[t.answer]}));
    let cfg={title:"Башня знаний",questions:q,useLatex:true};
    let s="window.__EMBEDDED_CFG__="+JSON.stringify(cfg)+";";
    let f=TOWER_TEMPLATE.replace("/*__CONFIG_DATA__*/",s);
    let b=new Blob([f],{type:"text/html"}); let a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="Игра.html"; a.click();
}
function openGameMenu(){document.getElementById('game-modal').style.display='flex'}
function openPresentationMenu(){document.getElementById('pres-modal').style.display='flex'}
</script>
</body>
</html>
